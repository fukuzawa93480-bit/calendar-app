<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 白背景 -->
  <circle cx="100" cy="100" r="99" fill="white"/>

  <!-- 外側の細いリング（黒） -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#111111" stroke-width="2"/>

  <!-- 内側の細いリング（黒・二重円） -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#111111" stroke-width="1.5"/>

  <!-- 紺色メイン円 -->
  <circle cx="100" cy="100" r="80" fill="#1e2d7d"/>

  <!-- 白い十字（縦） -->
  <rect x="88" y="22" width="24" height="156" fill="white"/>
  <!-- 白い十字（横） -->
  <rect x="22" y="88" width="156" height="24" fill="white"/>

  <!-- 7の字（紺色） -->
  <!-- 7の上横棒 -->
  <rect x="74" y="61" width="58" height="15" fill="#1e2d7d" rx="1"/>
  <!-- 7の斜め縦棒 -->
  <polygon points="110,76 128,76 100,143 82,143" fill="#1e2d7d"/>
  <!-- 7の中横棒（ヨーロッパスタイルの横線） -->
  <rect x="84" y="103" width="28" height="10" fill="#1e2d7d" rx="1"/>

  <!-- 上部テキスト FUKUZAWA（円弧に沿って） -->
  <path id="topArc" d="M 16,100 A 84,84 0 0,1 184,100" fill="none"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#111111" letter-spacing="4">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">FUKUZAWA</textPath>
  </text>

  <!-- 下部テキスト FUKUZAWA（逆円弧） -->
  <path id="bottomArc" d="M 16,100 A 84,84 0 0,0 184,100" fill="none"/>
  <text font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#111111" letter-spacing="4">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">FUKUZAWA</textPath>
  </text>
</svg>
