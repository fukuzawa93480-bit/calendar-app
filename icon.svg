<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 外側の円（背景） -->
  <circle cx="100" cy="100" r="98" fill="#1a3a6b" stroke="#1a3a6b" stroke-width="2"/>
  <!-- 内側の白い円 -->
  <circle cx="100" cy="100" r="84" fill="white"/>
  <!-- 内側の青い円 -->
  <circle cx="100" cy="100" r="78" fill="#1a3a6b"/>

  <!-- 十字（クロス） -->
  <rect x="86" y="20" width="28" height="160" fill="white" rx="4"/>
  <rect x="20" y="86" width="160" height="28" fill="white" rx="4"/>

  <!-- 中央の白い円 -->
  <circle cx="100" cy="100" r="26" fill="#1a3a6b"/>
  <!-- 中央テキスト "7" -->
  <text x="100" y="116" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="white">7</text>

  <!-- 上部テキスト "FUKUZAWA" (円弧に沿って) -->
  <path id="topArc" d="M 22,100 A 78,78 0 0,1 178,100" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="2">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">FUKUZAWA</textPath>
  </text>

  <!-- 下部テキスト "FUKUZAWA" (円弧に沿って) -->
  <path id="bottomArc" d="M 22,100 A 78,78 0 0,0 178,100" fill="none"/>
  <text font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="white" letter-spacing="2">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">FUKUZAWA</textPath>
  </text>

  <!-- 外周リングの点（装飾） -->
  <circle cx="100" cy="4" r="3" fill="white"/>
  <circle cx="100" cy="196" r="3" fill="white"/>
  <circle cx="4" cy="100" r="3" fill="white"/>
  <circle cx="196" cy="100" r="3" fill="white"/>
</svg>
